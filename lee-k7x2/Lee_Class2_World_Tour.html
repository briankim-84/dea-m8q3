<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>World Rush — Lee · Class 2</title>
<style>
  :root{
    --bg:#070a16; --ink:#FFFFFF; --sub:#93A4CC; --line:rgba(255,255,255,.12);
    --cyan:#1CE6D6; --mag:#FF3D8B; --gold:#FFD23F; --good:#2BE87C; --bad:#FF4D5E; --warm:#FF9A3D; --cool:#57B6FF;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;}
  html,body{height:100%;}
  body{background:#04060e;color:var(--ink);display:flex;justify-content:center;overscroll-behavior:none;}
  #app{position:relative;width:100%;max-width:430px;min-height:100vh;overflow:hidden;
    background:radial-gradient(120% 70% at 50% -8%,#1a2350 0%,#0d1330 42%,#070b1c 72%,#04060e 100%);}
  #app::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
    background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.014) 3px 4px);}
  #app.shake{animation:shk .28s;} #app.shakeHard{animation:shkH .4s;}
  @keyframes shk{0%,100%{transform:translate(0,0);}25%{transform:translate(-3px,2px);}50%{transform:translate(3px,-2px);}75%{transform:translate(-2px,-1px);}}
  @keyframes shkH{0%,100%{transform:translate(0,0);}15%{transform:translate(-7px,3px);}30%{transform:translate(7px,-4px);}45%{transform:translate(-6px,2px);}60%{transform:translate(5px,3px);}80%{transform:translate(-3px,-2px);}}

  #flash{position:absolute;inset:0;pointer-events:none;z-index:60;opacity:0;mix-blend-mode:screen;}
  #vig{position:absolute;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity .25s;
    box-shadow:inset 0 0 90px 20px rgba(255,60,80,.7),inset 0 0 30px rgba(255,60,80,.5);}
  #vig.on{animation:vigpulse .6s ease-in-out infinite;}
  @keyframes vigpulse{0%,100%{opacity:.35;}50%{opacity:.8;}}

  .screen{position:absolute;inset:0;display:flex;flex-direction:column;padding:16px 16px 18px;}
  .hidden{display:none!important;}
  .fadein{animation:fadein .35s cubic-bezier(.2,.8,.2,1);}
  @keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* START */
  #start{justify-content:center;align-items:center;text-align:center;}
  .globe{width:132px;height:132px;margin-bottom:6px;animation:spin 16s linear infinite,bobf 3.5s ease-in-out infinite;filter:drop-shadow(0 10px 30px rgba(28,230,214,.3));}
  @keyframes bobf{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  .kick{font-size:12px;letter-spacing:5px;color:var(--cyan);font-weight:900;margin-bottom:6px;}
  h1{font-size:46px;font-weight:900;line-height:.95;letter-spacing:-1px;font-style:italic;
    background:linear-gradient(100deg,#fff,#6ff5ea 45%,#ff6fb0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 0 30px rgba(28,230,214,.25);margin-bottom:12px;}
  .lede{font-size:14px;color:var(--sub);line-height:1.6;max-width:300px;margin-bottom:8px;}
  .lede b{color:var(--gold);}
  .routepv{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:14px 0 2px;max-width:320px;}
  .routepv .fp{width:29px;height:19px;border-radius:4px;overflow:hidden;box-shadow:0 3px 8px rgba(0,0,0,.4);}
  .cta{margin-top:22px;padding:17px 46px;border:none;border-radius:16px;cursor:pointer;font-size:18px;font-weight:900;font-style:italic;letter-spacing:1px;
    color:#04121a;background:linear-gradient(135deg,#37f0df,#12c6d8);box-shadow:0 12px 30px rgba(28,230,214,.45),inset 0 1px 0 rgba(255,255,255,.5);transition:.12s;}
  .cta:active{transform:translateY(2px) scale(.98);}
  .cta.mag{background:linear-gradient(135deg,#ff5c9c,#ff2f7f);box-shadow:0 12px 30px rgba(255,61,139,.45),inset 0 1px 0 rgba(255,255,255,.4);color:#2a0014;}

  /* TOP STRIP */
  .strip{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .abtn{width:60px;height:30px;border-radius:15px;background:rgba(255,255,255,.06);border:1px solid var(--line);
    color:var(--cyan);font-size:10px;font-weight:900;letter-spacing:.5px;cursor:pointer;}
  .scorepill{display:flex;align-items:center;gap:6px;padding:7px 15px;border-radius:16px;font-weight:900;font-size:17px;color:var(--gold);
    background:rgba(255,210,63,.10);border:1px solid rgba(255,210,63,.35);box-shadow:0 0 18px rgba(255,210,63,.15);}
  .scorepill svg{width:15px;height:15px;}
  .scorepill.bump{animation:sbump .35s;} @keyframes sbump{0%,100%{transform:scale(1);}45%{transform:scale(1.3);}}

  .flagrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .countrychip{display:flex;align-items:center;gap:9px;padding:6px 14px 6px 7px;border-radius:26px;background:rgba(255,255,255,.05);border:1px solid var(--line);}
  .countrychip .fp{width:31px;height:21px;border-radius:4px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.5);}
  .countrychip .cn{font-size:14px;font-weight:900;letter-spacing:.5px;}
  .countrychip .cn small{display:block;font-size:9px;color:var(--sub);font-weight:800;letter-spacing:1.5px;}
  .combopill{padding:6px 13px;border-radius:16px;font-weight:900;font-size:14px;font-style:italic;opacity:0;transform:scale(.6);transition:.15s;
    background:rgba(255,61,139,.14);border:1px solid rgba(255,61,139,.4);color:#ff9ac4;}
  .combopill.show{opacity:1;transform:scale(1);}
  .combopill.hot{background:rgba(255,210,63,.16);border-color:rgba(255,210,63,.5);color:var(--gold);box-shadow:0 0 16px rgba(255,210,63,.3);}

  .stamps{display:flex;gap:4px;justify-content:space-between;padding:7px 9px;border-radius:12px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.05);}
  .slot{position:relative;width:100%;aspect-ratio:1;border-radius:50%;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.10);overflow:hidden;}
  .slot.cur{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(28,230,214,.25),0 0 12px rgba(28,230,214,.4);}
  .slot .stamp{position:absolute;inset:0;border-radius:50%;overflow:hidden;opacity:0;}
  .slot.done .stamp{animation:thud .45s cubic-bezier(.2,1.6,.4,1) forwards;}
  @keyframes thud{0%{opacity:0;transform:scale(2.6) rotate(-22deg);}60%{opacity:1;transform:scale(.9);}100%{opacity:1;transform:scale(1);}}

  /* TIMER */
  .timerwrap{margin-top:9px;height:12px;border-radius:8px;background:rgba(255,255,255,.06);overflow:hidden;border:1px solid rgba(255,255,255,.06);position:relative;}
  .timerbar{height:100%;width:100%;border-radius:8px;transition:width .09s linear;background:linear-gradient(90deg,#2BE87C,#FFD23F);}
  .timerbar.mid{background:linear-gradient(90deg,#FFD23F,#FF9A3D);}
  .timerbar.low{background:linear-gradient(90deg,#FF4D5E,#FF7A3D);box-shadow:0 0 14px rgba(255,77,94,.7);animation:tpulse .35s infinite;}
  @keyframes tpulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.5);}}

  /* STAGE */
  .stage{flex:1;position:relative;display:flex;flex-direction:column;margin-top:12px;min-height:0;}
  .scene{flex:1;display:flex;flex-direction:column;animation:slidein .32s cubic-bezier(.2,.9,.25,1);}
  @keyframes slidein{from{opacity:0;transform:translateX(26px);}to{opacity:1;transform:none;}}
  .sceneTag{align-self:flex-start;font-size:10px;letter-spacing:2px;font-weight:900;text-transform:uppercase;padding:5px 12px;border-radius:16px;margin-bottom:12px;}
  .sceneTag.rest{color:#3a2410;background:linear-gradient(135deg,#ffcf8f,#ff9a3d);}
  .sceneTag.client{color:#062338;background:linear-gradient(135deg,#a9dcff,#57b6ff);}

  .npcwrap{display:flex;align-items:flex-end;gap:11px;margin-bottom:2px;}
  .avatar{flex:0 0 auto;width:72px;height:72px;border-radius:20px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.1);
    animation:pin .4s .04s both cubic-bezier(.2,1.4,.4,1);}
  @keyframes pin{from{opacity:0;transform:translateY(8px) scale(.75);}to{opacity:1;transform:none;}}
  .bubble{position:relative;flex:1;background:#fff;color:#141f38;border-radius:16px 16px 16px 4px;padding:12px 14px;font-size:16px;font-weight:700;line-height:1.4;
    box-shadow:0 8px 22px rgba(0,0,0,.4);animation:pin .4s .1s both cubic-bezier(.2,1.4,.4,1);}
  .bubble::after{content:"";position:absolute;left:-7px;bottom:0;width:14px;height:14px;background:#fff;clip-path:polygon(100% 0,100% 100%,0 100%);}
  .who{font-size:10px;font-weight:900;letter-spacing:1px;margin-bottom:2px;opacity:.5;}

  .situ{margin:13px 2px 0;font-size:13px;color:#dfe6f7;line-height:1.5;display:flex;gap:7px;}
  .situ .pin{color:var(--mag);flex:0 0 auto;}
  .hintchip{align-self:flex-start;margin:9px 2px 0;font-size:12.5px;font-weight:800;color:var(--gold);
    background:rgba(255,210,63,.10);border:1px solid rgba(255,210,63,.32);padding:6px 12px;border-radius:11px;display:flex;align-items:center;gap:6px;}

  .choices{margin-top:auto;padding-top:14px;display:flex;flex-direction:column;gap:10px;}
  .choice{position:relative;display:flex;align-items:center;gap:12px;padding:16px 15px 16px 14px;border-radius:15px;cursor:pointer;overflow:hidden;
    background:linear-gradient(135deg,#233163,#182248);border:1.5px solid rgba(120,150,220,.35);box-shadow:0 6px 16px rgba(0,0,0,.35);
    transition:transform .1s,box-shadow .15s;animation:chin .34s both cubic-bezier(.2,.9,.3,1);}
  .choice::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,var(--cyan),var(--mag));}
  .choice:nth-child(1){animation-delay:.05s;}.choice:nth-child(2){animation-delay:.11s;}.choice:nth-child(3){animation-delay:.17s;}
  @keyframes chin{from{opacity:0;transform:translateX(22px);}to{opacity:1;transform:none;}}
  .choice:active{transform:scale(.98);}
  .choice .dotn{flex:0 0 auto;width:28px;height:28px;border-radius:9px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#cfe0ff;}
  .choice .txt{font-size:17px;font-weight:800;letter-spacing:-.2px;color:#fff;}
  .choice.correct{background:linear-gradient(135deg,#127a4a,#0e5f3a);border-color:var(--good);box-shadow:0 0 26px rgba(43,232,124,.55);transform:scale(1.03);}
  .choice.correct::before{background:var(--good);}
  .choice.correct .dotn{background:var(--good);color:#053420;}
  .choice.wrongpick{background:linear-gradient(135deg,#7a1e2a,#5a1620);border-color:var(--bad);animation:cshake .35s;}
  .choice.wrongpick::before{background:var(--bad);}
  .choice.dim{opacity:.3;filter:grayscale(.4);}
  @keyframes cshake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

  /* impact */
  #fx{position:absolute;inset:0;pointer-events:none;z-index:50;overflow:hidden;}
  .impact{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%) scale(.3);font-size:44px;font-weight:900;font-style:italic;letter-spacing:-1px;
    text-shadow:0 4px 18px rgba(0,0,0,.5);animation:impact .8s cubic-bezier(.2,1.6,.3,1) forwards;white-space:nowrap;}
  @keyframes impact{0%{opacity:0;transform:translate(-50%,-50%) scale(.3) rotate(-6deg);}20%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(-3deg);}70%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(-3deg);}100%{opacity:0;transform:translate(-50%,-90%) scale(1) rotate(-3deg);}}
  .confetti{position:absolute;width:10px;height:14px;border-radius:2px;pointer-events:none;}
  @keyframes fall{to{transform:translateY(var(--fy)) rotate(var(--fr));opacity:0;}}

  /* RESULT */
  #result{justify-content:center;align-items:center;text-align:center;}
  .ticket{width:100%;max-width:340px;border-radius:20px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6);animation:slidein .4s cubic-bezier(.2,.85,.25,1);}
  .ticket .top{background:linear-gradient(135deg,#37f0df,#12c6d8);color:#042028;padding:20px;}
  .ticket .top .lbl{font-size:11px;letter-spacing:2px;font-weight:900;opacity:.7;}
  .ticket .top .big{font-size:30px;font-weight:900;font-style:italic;margin-top:2px;}
  .ticket .stars{margin-top:8px;display:flex;gap:6px;justify-content:center;}
  .ticket .stars svg{width:30px;height:30px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.25));}
  .ticket .stars .off{opacity:.28;}
  .ticket .perf{background:#0c1430;display:flex;}
  .ticket .perf .c{flex:1;padding:14px 6px;} .ticket .perf .c+.c{border-left:1px solid rgba(255,255,255,.08);}
  .ticket .perf .v{font-size:22px;font-weight:900;color:var(--gold);} .ticket .perf .k{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:1px;margin-top:1px;}
  .ticket .body{background:#fff;color:#17223c;padding:15px 16px 16px;}
  .ticket .msg{font-size:14px;color:#3a465f;line-height:1.5;margin-bottom:10px;}
  .rlist{text-align:left;}
  .rlist .r{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid #eef1f6;font-size:13px;}
  .rlist .r:last-child{border-bottom:none;}
  .rlist .r .fp{width:25px;height:16px;border-radius:3px;overflow:hidden;flex:0 0 auto;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .rlist .r b{color:#12213e;font-weight:800;} .rlist .r span{color:#8893a8;margin-left:auto;font-size:12px;}
  .rbtns{display:flex;gap:10px;margin-top:15px;width:100%;max-width:340px;}
  .rbtns .cta{flex:1;margin-top:0;padding:15px 0;font-size:15px;}
  .rbtns .ghost{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--cyan);box-shadow:none;}
</style>
</head>
<body>
<div id="app">
  <div id="vig"></div>
  <div id="flash"></div>

  <!-- START -->
  <div id="start" class="screen fadein">
    <div id="globeHolder"></div>
    <div class="kick">DO ENGLISH WITH BRIAN</div>
    <h1>WORLD RUSH</h1>
    <div class="lede">제한 시간 안에 <b>알맞은 표현</b>을 골라라! 연속으로 맞히면 <b>콤보 배수</b>가 터지고, 10개국 <b>여권 스탬프</b>를 모두 찍으면 클리어.</div>
    <div class="routepv" id="routePv"></div>
    <button class="cta" onclick="startGame()">&#9654; START</button>
  </div>

  <!-- PLAY -->
  <div id="play" class="screen hidden">
    <div class="strip">
      <button class="abtn" id="audioBtn" onclick="toggleSound()">&#9834; ON</button>
      <div class="scorepill" id="scorePill"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2l2.9 6.3 6.9.7-5.2 4.6 1.5 6.8L12 17.8 5.9 20.4 7.4 13.6 2.2 9l6.9-.7z"/></svg><span id="scoreN">0</span></div>
    </div>
    <div class="flagrow">
      <div class="countrychip" id="chip"></div>
      <div class="combopill" id="comboPill"></div>
    </div>
    <div class="stamps" id="stamps"></div>
    <div class="timerwrap"><div class="timerbar" id="timerBar"></div></div>
    <div class="stage" id="stage"></div>
    <div id="fx"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="screen hidden"></div>
</div>

<script>
const $=id=>document.getElementById(id);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

const KO={
 "What do you recommend?":"뭐가 맛있어요? / 추천해 주시겠어요?",
 "I'll have the same.":"저도 같은 걸로 할게요.",
 "Would you like something to drink?":"마실 것 좀 드릴까요?",
 "This is on me.":"제가 살게요. / 제가 대접하겠습니다.",
 "Can I get the check, please?":"계산서 주시겠어요?",
 "What brings you here?":"무슨 일로 오셨어요?",
 "Let me tell you about us.":"저희 회사 소개해 드릴게요.",
 "What do you do?":"무슨 일 하세요?",
 "Let's keep in touch.":"앞으로 연락하고 지내요.",
 "I look forward to working with you.":"함께 일하게 되길 기대합니다."
};
const STOPS=[
 {country:"ITALY",code:"it",type:"rest",speaker:"waiter",prompt:"Are you ready to order?",
  sit:"웨이터가 주문을 받으러 왔어요. 뭐가 맛있는지 물어보세요.",correct:"What do you recommend?",wrongs:["This is on me.","Let's keep in touch."]},
 {country:"FRANCE",code:"fr",type:"rest",speaker:"diner",prompt:"I'll take the steak.",
  sit:"함께 온 상대가 스테이크를 시켰어요. 나도 같은 걸로 하고 싶어요.",correct:"I'll have the same.",wrongs:["What do you do?","Can I get the check, please?"]},
 {country:"JAPAN",code:"jp",type:"rest",speaker:"diner",prompt:"Thanks for inviting me!",
  sit:"상대가 자리에 앉았어요. 마실 것을 권해 보세요.",correct:"Would you like something to drink?",wrongs:["What brings you here?","I'll have the same."]},
 {country:"USA",code:"us",type:"rest",speaker:"diner",prompt:"Let me pay this time.",
  sit:"식사가 끝나고 상대가 지갑을 꺼내려 해요. 내가 대접하고 싶어요.",correct:"This is on me.",wrongs:["What do you recommend?","Let me tell you about us."]},
 {country:"SPAIN",code:"es",type:"rest",speaker:"waiter",prompt:"How was everything?",
  sit:"이제 계산을 하려고 해요. 웨이터에게 계산서를 요청하세요.",correct:"Can I get the check, please?",wrongs:["Would you like something to drink?","Let's keep in touch."]},
 {country:"SINGAPORE",code:"sg",type:"client",speaker:"client_f",prompt:"Hi, I saw your booth.",
  sit:"박람회 부스로 새 고객이 다가왔어요. 무슨 일로 왔는지 물어보세요.",correct:"What brings you here?",wrongs:["This is on me.","I'll have the same."]},
 {country:"UK",code:"gb",type:"client",speaker:"client_m",prompt:"So, what does your company do?",
  sit:"고객이 우리 회사를 궁금해해요. 회사를 소개해 주세요.",correct:"Let me tell you about us.",wrongs:["Can I get the check, please?","Let's keep in touch."]},
 {country:"GERMANY",code:"de",type:"client",speaker:"client_m",prompt:"Nice to finally meet you in person.",
  sit:"상대가 무슨 일을 하는지 아직 몰라요. 물어보세요.",correct:"What do you do?",wrongs:["What do you recommend?","This is on me."]},
 {country:"UAE",code:"ae",type:"client",speaker:"client_f",prompt:"This was a great chat.",
  sit:"대화를 마치며 앞으로도 연락하고 싶어요.",correct:"Let's keep in touch.",wrongs:["Would you like something to drink?","What brings you here?"]},
 {country:"AUSTRALIA",code:"au",type:"client",speaker:"client_m",prompt:"Let's talk again soon about a project.",
  sit:"함께 일하게 되길 바라며 마무리 인사를 해요.",correct:"I look forward to working with you.",wrongs:["Can I get the check, please?","What do you do?"]},
];

/* ============ SVG FLAGS ============ */
function flag(code){
  const cid="fc"+code+(Math.random()*1e6|0);
  const clip=`<clipPath id="${cid}"><rect width="30" height="20" rx="3"/></clipPath>`;
  let inner="";
  switch(code){
   case"it": inner=`<rect width="10" height="20" fill="#4a9b52"/><rect x="10" width="10" height="20" fill="#fff"/><rect x="20" width="10" height="20" fill="#d9433f"/>`;break;
   case"fr": inner=`<rect width="10" height="20" fill="#28348a"/><rect x="10" width="10" height="20" fill="#fff"/><rect x="20" width="10" height="20" fill="#d9433f"/>`;break;
   case"jp": inner=`<rect width="30" height="20" fill="#fff"/><circle cx="15" cy="10" r="5.4" fill="#d43040"/>`;break;
   case"us": inner=`<rect width="30" height="20" fill="#fff"/>`+[0,2,4,6,8].map(i=>`<rect y="${i*2}" width="30" height="1.5" fill="#c0304a"/>`).join("")+`<rect width="13" height="11" fill="#2a3d7a"/>`+[3,7,11].map(x=>[2.5,6,9.5].map(y=>`<circle cx="${x}" cy="${y}" r=".7" fill="#fff"/>`).join("")).join("");break;
   case"es": inner=`<rect width="30" height="20" fill="#c0304a"/><rect y="5" width="30" height="10" fill="#f2c14e"/>`;break;
   case"sg": inner=`<rect width="30" height="10" fill="#d43040"/><rect y="10" width="30" height="10" fill="#fff"/><circle cx="8" cy="5" r="3.4" fill="#fff"/><circle cx="9.4" cy="5" r="3.1" fill="#d43040"/>`+[11,14.2].map(x=>`<circle cx="${x}" cy="4" r=".7" fill="#fff"/>`).join("");break;
   case"gb": inner=`<rect width="30" height="20" fill="#28348a"/><path d="M0 0L30 20M30 0L0 20" stroke="#fff" stroke-width="3.5"/><path d="M0 0L30 20M30 0L0 20" stroke="#c0304a" stroke-width="1.6"/><rect x="12.5" width="5" height="20" fill="#fff"/><rect y="7.5" width="30" height="5" fill="#fff"/><rect x="13.5" width="3" height="20" fill="#c0304a"/><rect y="8.5" width="30" height="3" fill="#c0304a"/>`;break;
   case"de": inner=`<rect width="30" height="6.7" fill="#1a1a1a"/><rect y="6.7" width="30" height="6.7" fill="#c0304a"/><rect y="13.4" width="30" height="6.6" fill="#f2c14e"/>`;break;
   case"ae": inner=`<rect width="30" height="20" fill="#fff"/><rect y="0" width="30" height="6.7" fill="#4a9b52"/><rect y="13.3" width="30" height="6.7" fill="#1a1a1a"/><rect width="8" height="20" fill="#c0304a"/>`;break;
   case"au": inner=`<rect width="30" height="20" fill="#28348a"/><rect width="15" height="10" fill="#28348a"/><path d="M0 0L15 10M15 0L0 10" stroke="#fff" stroke-width="2"/><rect x="6" width="3" height="10" fill="#fff"/><rect y="3.5" width="15" height="3" fill="#fff"/><rect x="6.6" width="1.8" height="10" fill="#c0304a"/><rect y="4.1" width="15" height="1.8" fill="#c0304a"/>`+[[22,6],[25,11],[20,13],[26,16],[7,17]].map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r=".9" fill="#fff"/>`).join("");break;
   default: inner=`<rect width="30" height="20" fill="#888"/>`;
  }
  return `<svg class="fp" viewBox="0 0 30 20" preserveAspectRatio="xMidYMid slice"><defs>${clip}</defs><g clip-path="url(#${cid})">${inner}</g></svg>`;
}


/* ============ SVG CHARACTERS ============ */
function avatar(type){
  const P={
    waiter:{bg:"#2f8f7a",skin:"#f2c9a0",hair:"#3a2a1e",cloth:"#20242c",coll:"#fff",acc:"#111"},
    diner:{bg:"#3a63b0",skin:"#eebd94",hair:"#26364f",cloth:"#5b7fc7",coll:"#dfe8fb",acc:"#2a3c5e"},
    client_m:{bg:"#8a6bd1",skin:"#f0c49c",hair:"#2b2320",cloth:"#2c3550",coll:"#fff",acc:"#c0304a"},
    client_f:{bg:"#d1668f",skin:"#f2c6a6",hair:"#4a2e2a",cloth:"#3a4664",coll:"#fff",acc:"#e0b64a"},
  }[type]||{bg:"#666",skin:"#eec",hair:"#333",cloth:"#444",coll:"#fff",acc:"#111"};
  let extras="";
  if(type==="waiter") extras=`<path d="M40 92 h20 v6 h-20z" fill="${P.acc}"/><path d="M46 70 l4 5 4-5z" fill="${P.acc}"/>`; // bowtie-ish
  if(type==="client_m") extras=`<path d="M50 72 l3 6 -3 14 -3 -14z" fill="${P.acc}"/>`; // tie
  if(type==="client_f") extras=`<path d="M50 72 v14" stroke="${P.coll}" stroke-width="2"/><circle cx="50" cy="90" r="2.4" fill="${P.acc}"/>`;
  const hair = type==="client_f"
    ? `<path d="M28 44 q22 -30 44 0 v20 q-6 -6 -6 -16 q-16 12 -32 0 q0 10 -6 16z" fill="${P.hair}"/>`
    : `<path d="M30 46 q20 -28 40 0 q-6 -12 -20 -12 q-14 0 -20 12z" fill="${P.hair}"/>`;
  return `<svg viewBox="0 0 100 100" width="100%" height="100%">
    <rect width="100" height="100" fill="${P.bg}"/>
    <circle cx="50" cy="118" r="46" fill="${P.cloth}"/>
    <path d="M40 88 q10 8 20 0 v10 h-20z" fill="${P.coll}"/>
    <rect x="34" y="52" width="32" height="30" rx="15" fill="${P.skin}"/>
    ${hair}
    <circle cx="43" cy="64" r="2.1" fill="#26333f"/><circle cx="57" cy="64" r="2.1" fill="#26333f"/>
    <path d="M45 72 q5 4 10 0" stroke="#b5744f" stroke-width="2" fill="none" stroke-linecap="round"/>
    ${extras}
  </svg>`;
}


/* ============ STATE ============ */
let idx=0, score=0, combo=0, bestCombo=0, cleanHits=0, locked=false;
const TIME=7000; let tLeft=TIME, timer=null, tickAcc=0;

function buildStamps(){ let h=""; for(let i=0;i<STOPS.length;i++) h+=`<div class="slot" id="slot${i}"><div class="stamp" id="stamp${i}"></div></div>`; $("stamps").innerHTML=h; }

function startGame(){ audioInit(); startBgm(); idx=0;score=0;combo=0;bestCombo=0;cleanHits=0;
  $("start").classList.add("hidden"); $("result").classList.add("hidden");
  const pl=$("play"); pl.classList.remove("hidden"); pl.classList.add("fadein");
  $("scoreN").textContent="0"; hideCombo(); buildStamps(); renderStop(); }

function renderStop(){
  locked=false;
  const s=STOPS[idx];
  $("chip").innerHTML=`${flag(s.code)}<div class="cn">${s.country}<small>STOP ${idx+1} / 10</small></div>`;
  document.querySelectorAll(".slot").forEach((el,i)=>el.classList.toggle("cur",i===idx));
  const accent=s.type==="rest"?"rest":"client";
  const label=s.type==="rest"?"RESTAURANT · 해외 비즈니스 식사":"NEW CLIENT · 새로운 고객";
  const who=s.speaker==="waiter"?"WAITER":s.speaker==="diner"?"GUEST":"CLIENT";
  const opts=shuffle([{t:s.correct,ok:true},{t:s.wrongs[0],ok:false},{t:s.wrongs[1],ok:false}]);
  let ch=""; opts.forEach((o,i)=>{ ch+=`<button class="choice" id="opt${i}" onclick="pick(this,${o.ok?1:0})">
     <span class="dotn">${i+1}</span><span class="txt">${o.t}</span></button>`; });
  $("stage").innerHTML=`<div class="scene">
     <span class="sceneTag ${accent}">${label}</span>
     <div class="npcwrap"><div class="avatar">${avatar(s.speaker)}</div>
       <div class="bubble"><div class="who">${who}</div>"${s.prompt}"</div></div>
     <div class="situ"><span class="pin">&#9670;</span><span>${s.sit}</span></div>
     <div class="hintchip"><svg width="13" height="13" viewBox="0 0 24 24"><path fill="#FFD23F" d="M9 21h6v-1H9zm-1-3h8v-2A7 7 0 1 0 8 16zM12 2a7 7 0 0 1 4 12.7"/></svg>${KO[s.correct]}</div>
     <div class="choices">${ch}</div></div>`;
  startTimer();
}

function startTimer(){
  tLeft=TIME; const bar=$("timerBar"); bar.style.width="100%"; bar.className="timerbar";
  $("vig").classList.remove("on"); tickAcc=0;
  clearInterval(timer);
  timer=setInterval(()=>{
    tLeft-=80; const p=Math.max(0,tLeft/TIME*100); bar.style.width=p+"%";
    if(p<30){ bar.className="timerbar low"; $("vig").classList.add("on"); tickAcc+=80; if(tickAcc>=250){tickAcc=0;sTick();} }
    else if(p<60){ bar.className="timerbar mid"; }
    if(tLeft<=0){ clearInterval(timer); timeout(); }
  },80);
}

function pick(btn,ok){
  if(locked) return; locked=true; clearInterval(timer); $("vig").classList.remove("on");
  const s=STOPS[idx];
  document.querySelectorAll(".choice").forEach(b=>b.onclick=null);
  if(ok){
    btn.classList.add("correct");
    document.querySelectorAll(".choice").forEach(b=>{ if(b!==btn)b.classList.add("dim"); });
    combo++; bestCombo=Math.max(bestCombo,combo); cleanHits++;
    const mult=Math.min(combo,5);
    const bonus=Math.round(Math.max(0,tLeft)/TIME*60);
    const gain=100*mult+bonus; score+=gain;
    bumpScore(); flash("rgba(43,232,124,.5)"); shake(false); confetti(); showCombo(combo);
    impact(comboText(combo,mult), comboColor(combo));
    floatUp("+"+gain, btn); sHit(combo);
    stampNow();
    setTimeout(next, 760);
  } else {
    btn.classList.add("wrongpick");
    combo=0; hideCombo(); flash("rgba(255,77,94,.5)"); shake(true); sWrong();
    // reveal correct
    document.querySelectorAll(".choice").forEach(b=>{ const t=b.querySelector(".txt").textContent;
      if(t===s.correct) b.classList.add("correct"); else if(b!==btn) b.classList.add("dim"); });
    stampNow();
    setTimeout(next, 1050);
  }
}
function timeout(){
  if(locked) return; locked=true; $("vig").classList.remove("on");
  const s=STOPS[idx];
  document.querySelectorAll(".choice").forEach(b=>{ b.onclick=null; const t=b.querySelector(".txt").textContent;
    if(t===s.correct) b.classList.add("correct"); else b.classList.add("dim"); });
  combo=0; hideCombo(); flash("rgba(255,77,94,.55)"); shake(true); sWrong();
  impact("TIME!", "#FF4D5E");
  stampNow();
  setTimeout(next, 1050);
}
function stampNow(){ const st=$("stamp"+idx); st.innerHTML=flag(STOPS[idx].code); $("slot"+idx).classList.add("done"); sStamp(); }
function next(){ idx++; if(idx>=STOPS.length) showResult(); else renderStop(); }

/* impact helpers */
function comboText(c,m){ if(c>=5)return "ON FIRE! &times;"+m; if(c>=3)return "COMBO &times;"+c; if(c===2)return "GREAT!"; return "NICE!"; }
function comboColor(c){ return c>=5?"#FFD23F":c>=3?"#FF9A3D":"#2BE87C"; }
function impact(txt,color){ const d=document.createElement("div"); d.className="impact"; d.style.color=color; d.innerHTML=txt; $("fx").appendChild(d); setTimeout(()=>d.remove(),820); }
function showCombo(c){ if(c<2){hideCombo();return;} const p=$("comboPill"); p.textContent="COMBO x"+c; p.classList.add("show"); p.classList.toggle("hot",c>=3); }
function hideCombo(){ const p=$("comboPill"); p.classList.remove("show","hot"); }
function bumpScore(){ $("scoreN").textContent=score; const p=$("scorePill"); p.classList.remove("bump");void p.offsetWidth;p.classList.add("bump"); }
function shake(hard){ const a=$("app"); a.classList.remove("shake","shakeHard");void a.offsetWidth; a.classList.add(hard?"shakeHard":"shake"); }
function flash(c){ const f=$("flash"); f.style.background=c; f.style.transition="none"; f.style.opacity="1"; void f.offsetWidth; f.style.transition="opacity .4s"; f.style.opacity="0"; }
function floatUp(txt,near){ const f=document.createElement("div"); f.style.cssText="position:absolute;z-index:51;font-weight:900;font-size:22px;color:#2BE87C;text-shadow:0 2px 12px rgba(43,232,124,.5);animation:rise 1s ease forwards;pointer-events:none";
  f.textContent=txt; const r=near.getBoundingClientRect(),a=$("app").getBoundingClientRect(); f.style.left=(r.left-a.left+18)+"px"; f.style.top=(r.top-a.top-6)+"px"; $("fx").appendChild(f); setTimeout(()=>f.remove(),1000); }
const _riseKF=document.createElement("style"); _riseKF.textContent="@keyframes rise{0%{opacity:0;transform:translateY(8px) scale(.7)}25%{opacity:1}100%{opacity:0;transform:translateY(-46px) scale(1.15)}}"; document.head.appendChild(_riseKF);
function confetti(){ const cols=["#1CE6D6","#FF3D8B","#FFD23F","#2BE87C","#57B6FF","#FF9A3D"]; const host=$("fx");
  for(let i=0;i<30;i++){ const c=document.createElement("div"); c.className="confetti"; c.style.background=cols[i%cols.length];
    c.style.left=(20+Math.random()*60)+"%"; c.style.top=(28+Math.random()*16)+"%";
    c.style.setProperty("--fy",(180+Math.random()*240)+"px"); c.style.setProperty("--fr",(Math.random()*760-380)+"deg");
    c.style.animation=`fall ${0.8+Math.random()*0.7}s cubic-bezier(.2,.7,.3,1) forwards`; host.appendChild(c); setTimeout(()=>c.remove(),1600); } }

/* RESULT */
function showResult(){
  stopBgm(); sWin();
  const acc=Math.round(cleanHits/STOPS.length*100);
  const stars=acc>=90?3:acc>=60?2:1;
  let rank,msg;
  if(stars===3){ rank="GLOBETROTTER"; msg="완벽에 가까운 질주! 10개국 표현을 순식간에 맞혔어요."; }
  else if(stars===2){ rank="JETSETTER"; msg="빠르고 정확했어요. 한 번 더 돌면 3스타도 문제없어요!"; }
  else { rank="EXPLORER"; msg="좋은 출발! 표현을 한 번 더 익히고 다시 질주해볼까요?"; }
  const star=(on)=>`<svg class="${on?'':'off'}" viewBox="0 0 24 24"><path fill="#fff" stroke="#0a8f9a" stroke-width="1" d="M12 2l2.9 6.3 6.9.7-5.2 4.6 1.5 6.8L12 17.8 5.9 20.4 7.4 13.6 2.2 9l6.9-.7z"/></svg>`;
  const rows=STOPS.map(s=>`<div class="r">${flag(s.code)}<b>${s.correct}</b><span>${s.country}</span></div>`).join("");
  $("result").innerHTML=`<div class="ticket">
    <div class="top"><div class="lbl">BOARDING PASS · WORLD RUSH</div><div class="big">${rank}</div>
      <div class="stars">${star(stars>=1)}${star(stars>=2)}${star(stars>=3)}</div></div>
    <div class="perf"><div class="c"><div class="v">${score}</div><div class="k">SCORE</div></div>
      <div class="c"><div class="v">&times;${bestCombo}</div><div class="k">BEST COMBO</div></div>
      <div class="c"><div class="v">${acc}%</div><div class="k">ACCURACY</div></div></div>
    <div class="body"><div class="msg">${msg}</div><div class="rlist">${rows}</div></div></div>
    <div class="rbtns"><button class="cta ghost" onclick="goStart()">HOME</button>
      <button class="cta mag" onclick="startGame()">&#8635; RUSH AGAIN</button></div>`;
  $("play").classList.add("hidden"); $("result").classList.remove("hidden"); $("result").classList.add("fadein");
}
function goStart(){ stopBgm(); $("result").classList.add("hidden"); $("play").classList.add("hidden"); $("start").classList.remove("hidden"); }

/* start visuals */
(function initStart(){
  $("globeHolder").innerHTML=`<svg class="globe" viewBox="0 0 120 120"><defs><radialGradient id="og" cx="38%" cy="34%"><stop offset="0" stop-color="#6ff5ea"/><stop offset="55%" stop-color="#17b6d8"/><stop offset="100%" stop-color="#0e3a8a"/></radialGradient></defs>
    <circle cx="60" cy="60" r="54" fill="url(#og)" stroke="rgba(255,255,255,.25)" stroke-width="2"/>
    <path d="M22 46 q18 -10 40 -4 q22 6 38 -2 l0 8 q-20 8 -40 2 q-20 -6 -38 4z" fill="#2be87c" opacity=".85"/>
    <path d="M30 72 q16 8 34 4 q20 -4 30 4 l-2 8 q-16 -6 -32 -2 q-18 4 -32 -4z" fill="#2be87c" opacity=".8"/>
    <ellipse cx="60" cy="60" rx="54" ry="20" fill="none" stroke="rgba(255,255,255,.18)"/><ellipse cx="60" cy="60" rx="24" ry="54" fill="none" stroke="rgba(255,255,255,.14)"/></svg>`;
  $("routePv").innerHTML=STOPS.map(s=>flag(s.code)).join("");
})();

/* AUDIO */
let actx=null,sOn=true,bgmGain=null,bgmTimer=null,bgmStep=0;
function audioInit(){ if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} if(actx&&actx.state==="suspended")actx.resume(); }
function beep(fs,d,type,v,gap){ if(!actx||!sOn)return; let t=actx.currentTime;gap=gap||0;
  fs.forEach((f,i)=>{const o=actx.createOscillator(),g=actx.createGain();o.type=type||"sine";o.frequency.value=f;o.connect(g);g.connect(actx.destination);
    const s=t+i*(d+gap);g.gain.setValueAtTime(.0001,s);g.gain.exponentialRampToValueAtTime(v||.16,s+.008);g.gain.exponentialRampToValueAtTime(.0001,s+d);o.start(s);o.stop(s+d+.04);}); }
function sHit(combo){ const base=520+Math.min(combo,6)*70; beep([base],.05,"square",.2,0); beep([90],.09,"sine",.22,0); beep([base*1.5,base*2],.08,"triangle",.14,.02); }
const sWrong=()=>beep([160,110],.18,"sawtooth",.16,0);
const sTick=()=>beep([1400],.03,"square",.09,0);
const sStamp=()=>beep([110,80],.12,"square",.14,.01);
const sWin=()=>beep([523,659,784,1047,1319,1568],.15,"triangle",.18,.05);
function mfreq(m){return 440*Math.pow(2,(m-69)/12);}
const PROG=[{b:45,a:[69,72,76,72]},{b:40,a:[64,67,71,67]},{b:43,a:[67,71,74,71]},{b:41,a:[65,69,72,69]}];
function bnote(f,d,t,v){ if(!actx||!bgmGain)return;const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(bgmGain);
  const s=actx.currentTime;g.gain.setValueAtTime(.0001,s);g.gain.exponentialRampToValueAtTime(v,s+.03);g.gain.exponentialRampToValueAtTime(.0001,s+d);o.start(s);o.stop(s+d+.05);}
function startBgm(){ audioInit(); if(!actx||bgmTimer)return; if(!bgmGain){bgmGain=actx.createGain();bgmGain.gain.value=sOn?.35:0;bgmGain.connect(actx.destination);}
  const beat=.34;bgmStep=0; bgmTimer=setInterval(()=>{const c=PROG[Math.floor(bgmStep/4)%PROG.length];
    if(bgmStep%2===0)bnote(mfreq(c.b),beat*1.7,"sawtooth",.04); bnote(mfreq(c.a[bgmStep%4]),beat*.9,"square",.025);
    bgmStep=(bgmStep+1)%(PROG.length*4);},beat*1000); }
function stopBgm(){ clearInterval(bgmTimer);bgmTimer=null; }
function toggleSound(){ sOn=!sOn; $("audioBtn").innerHTML=sOn?"&#9834; ON":"&#9834; OFF"; $("audioBtn").style.opacity=sOn?1:.5;
  if(bgmGain)bgmGain.gain.value=sOn?.35:0; if(sOn){audioInit(); if(!bgmTimer && !$("play").classList.contains("hidden"))startBgm();} }
</script>
