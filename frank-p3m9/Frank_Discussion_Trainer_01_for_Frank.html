<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Discussion Trainer · Frank — Do English with Brian</title>
<style>
  :root{--navy:#0E2038;--gold:#E7B43D;--ink:#F4F7FC;--sub:#9DB0CC;
    --good:#3FD08A;--bad:#FF6B6B;--line:rgba(231,180,61,.22);--card:#13263f;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:#060f1f;color:var(--ink);display:flex;justify-content:center;min-height:100vh;}
  #app{width:100%;max-width:540px;min-height:100vh;background:
    radial-gradient(120% 50% at 50% 0%,#12294a,#0a1830 55%,#060f1f);}
  header{padding:18px 18px 0;}
  .brand{font-size:11px;letter-spacing:2px;color:var(--gold);font-weight:800;}
  h1{font-size:20px;font-weight:900;margin-top:3px;}
  .sub{font-size:12px;color:var(--sub);margin-top:4px;}
  .tabs{display:flex;gap:8px;margin:14px 0 0;padding-bottom:12px;}
  .tabs button{flex:1;padding:11px;border-radius:11px;border:1px solid var(--line);background:#10233f;color:var(--sub);font-weight:800;font-size:14px;cursor:pointer;}
  .tabs button.on{background:linear-gradient(135deg,#caa233,#e7b43d);color:#1a1206;border-color:transparent;}
  main{padding:4px 16px 40px;}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--sub);margin:6px 2px 10px;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid var(--line);color:var(--sub);}
  .chip b{color:var(--gold);}
  .bar{height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden;margin:0 2px 14px;}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,#caa233,#e7b43d);width:0%;transition:width .25s;}
  /* flashcard */
  .fcard{background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:16px;min-height:230px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:26px 20px;cursor:pointer;user-select:none;position:relative;}
  .fcard .tag{position:absolute;top:12px;left:14px;font-size:11px;font-weight:800;color:var(--gold);letter-spacing:1px;}
  .fcard .flip{position:absolute;bottom:12px;font-size:11px;color:var(--sub);}
  .fcard .ko{font-size:20px;font-weight:800;line-height:1.5;}
  .fcard .en{font-size:22px;font-weight:900;color:var(--gold);line-height:1.4;}
  .fcard .exm{font-size:14px;color:var(--sub);margin-top:12px;line-height:1.5;font-style:italic;}
  .grades{display:flex;gap:8px;margin-top:12px;}
  .grades button{flex:1;padding:13px 6px;border-radius:12px;border:1px solid var(--line);background:#10233f;color:var(--ink);font-weight:800;font-size:14px;cursor:pointer;}
  .grades .g0{border-color:rgba(255,107,107,.5);color:var(--bad);}
  .grades .g1{border-color:rgba(231,180,61,.5);color:var(--gold);}
  .grades .g2{border-color:rgba(63,208,138,.5);color:var(--good);}
  .grades button:active{transform:scale(.97);}
  /* situation */
  .scen{background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px;}
  .scen .who{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--gold);margin-bottom:8px;}
  .bubble{background:#0e1d33;border:1px solid rgba(255,255,255,.1);border-radius:4px 16px 16px 16px;
    padding:13px 14px;font-size:16px;line-height:1.55;font-weight:600;}
  .bubble.scene{border-radius:12px;border-style:dashed;font-weight:500;color:var(--ink);}
  textarea.ans{width:100%;margin-top:12px;padding:12px 13px;border-radius:11px;border:1px solid rgba(255,255,255,.14);
    background:#0e1d33;color:var(--ink);font-size:16px;line-height:1.5;min-height:74px;resize:none;font-family:inherit;}
  textarea.ans:focus{outline:none;border-color:var(--gold);}
  textarea.ans.ok{border-color:var(--good);}
  textarea.ans.no{border-color:var(--bad);animation:shake .3s;}
  @keyframes shake{25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
  .rowb{display:flex;gap:8px;margin-top:10px;}
  .btn{flex:1;padding:13px;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-weight:900;
    background:linear-gradient(135deg,#caa233,#e7b43d);color:#1a1206;}
  .btn.ghost{background:#10233f;color:var(--gold);border:1px solid var(--line);}
  .btn[disabled]{opacity:.45;pointer-events:none;}
  .hintbox{margin-top:10px;font-size:13px;color:var(--sub);line-height:1.6;background:#10233f;border:1px solid var(--line);border-radius:11px;padding:10px 12px;display:none;}
  .result{margin-top:10px;border-radius:11px;padding:12px 13px;font-size:14px;line-height:1.6;display:none;}
  .result.ok{background:rgba(63,208,138,.12);border:1px solid rgba(63,208,138,.4);}
  .result.no{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.35);}
  .result .mdl{font-weight:800;color:var(--gold);}
  .done{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 20px;text-align:center;}
  .done h2{font-size:20px;margin-bottom:8px;}
  .done p{font-size:14px;color:var(--sub);line-height:1.7;margin-bottom:14px;}

  .mcq{display:flex;flex-direction:column;gap:9px;margin-top:12px;}
  .mcq .opt{width:100%;text-align:left;padding:13px 14px;border-radius:11px;border:1px solid rgba(255,255,255,.14);
    background:#16293f;color:var(--ink);font-size:14.5px;line-height:1.4;font-weight:600;cursor:pointer;transition:.12s;}
  .mcq .opt:active{transform:scale(.99);}
  .mcq .opt.correct{background:rgba(63,208,138,.16);border-color:var(--good);color:var(--good);}
  .mcq .opt.wrong{background:rgba(255,107,107,.14);border-color:var(--bad);color:var(--bad);}
  .mcq .opt.dim{opacity:.4;}
  .intro{font-size:13px;color:var(--sub);line-height:1.6;margin:0 0 12px;background:#10233f;border:1px solid var(--line);border-radius:12px;padding:11px 13px;}
</style>
</head>

    <div class="brand">DO ENGLISH WITH BRIAN</div>

  </header>

// ================= STORAGE (IndexedDB) =================
const DB='dewb_trainer', ST='kv', KEY='frank_31_50';
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);
 r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains(ST))r.result.createObjectStore(ST);};
 r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);});}
async function save(){try{const d=await idb();await new Promise(r=>{const t=d.transaction(ST,'readwrite');
 t.objectStore(ST).put(JSON.stringify(STATE),KEY); t.oncomplete=()=>r(1); t.onerror=()=>r(0);});}catch(e){}}
async function load(){try{const d=await idb();return await new Promise(r=>{const t=d.transaction(ST,'readonly');
 const q=t.objectStore(ST).get(KEY); q.onsuccess=()=>r(q.result?JSON.parse(q.result):null); q.onerror=()=>r(null);});}catch(e){return null;}}

let STATE={box:{},seen:{},scOK:{},scTry:{}};  // box: 0새~3마스터
const $=id=>document.getElementById(id);
const BOXNAME=['새 카드','학습 중','익숙함','마스터'];

let tab='A';
function showTab(t){tab=t;$("tabA").classList.toggle('on',t==='A');$("tabB").classList.toggle('on',t==='B');
 t==='A'?startCards():startScen();}

window.addEventListener('load',async()=>{const s=await load(); if(s)STATE=Object.assign(STATE,s); startCards();});

// ================= TAB A · FLASHCARDS =================
let q=[],cur=null,flipped=false,doneCnt=0,total=0;
function boxOf(n){return STATE.box[n]||0;}
function startCards(){
  q=ITEMS.slice().sort((a,b)=>{const d=boxOf(a.n)-boxOf(b.n); if(d)return d;
    return (STATE.seen[a.n]||0)-(STATE.seen[b.n]||0);});
  doneCnt=0; total=q.length; nextCard();
}
function boxChips(){const c=[0,0,0,0]; ITEMS.forEach(it=>c[boxOf(it.n)]++);
  return c.map((v,i)=>`<span class="chip">${BOXNAME[i]} <b>${v}</b></span>`).join('');}
function nextCard(){
  if(!q.length){ $("main").innerHTML=`<div class="done"><h2>🎉 오늘 카드 완료!</h2>
    <p>모든 카드를 한 바퀴 돌았어요.<br>몰랐던 카드는 다음 세션에서 먼저 나옵니다.</p>
    <div class="chips" style="justify-content:center;margin-bottom:14px">${boxChips()}</div>
    <button class="btn" onclick="startCards()">🔁 한 바퀴 더</button></div>`; return; }
  cur=q.shift(); flipped=false; renderCard();
}
function renderCard(){
  const pct=Math.round(doneCnt/total*100);
  $("main").innerHTML=`
   <div class="meta"><span>카드 ${doneCnt+1} / ${total}</span><div class="chips">${boxChips()}</div></div>
   <div class="bar"><i style="width:${pct}%"></i></div>
   <div class="fcard" onclick="flip()">
     <span class="tag">#${cur.n} · ${cur.cat}</span>
     ${flipped
       ?`<div class="en">${cur.en}</div><div class="exm">"${cur.ex}"</div>`
       :`<div class="ko">${cur.ko}</div>`}
     <span class="flip">${flipped?'':'👆 탭해서 정답 확인'}</span>
   </div>
   ${flipped?`<div class="grades">
     <button class="g0" onclick="grade(0)">😵 몰랐어요</button>
     <button class="g1" onclick="grade(1)">🤔 애매해요</button>
     <button class="g2" onclick="grade(2)">😎 알았어요</button></div>`
   :`<div class="grades"><button style="opacity:.45;pointer-events:none">머릿속으로 영어 문장을 만든 뒤 카드를 탭!</button></div>`}`;
}
function flip(){ if(!flipped){flipped=true;renderCard();} }
function grade(g){
  STATE.seen[cur.n]=Date.now();
  if(g===0){ STATE.box[cur.n]=0; q.splice(Math.min(3,q.length),0,cur); total++; }
  else if(g===1){ STATE.box[cur.n]=Math.max(1,boxOf(cur.n)); q.splice(Math.min(7,q.length),0,cur); total++; }
  else { STATE.box[cur.n]=Math.min(3,boxOf(cur.n)+1); }
  doneCnt++; save(); nextCard();
}

// ================= TAB B · SITUATION TRAINING =================
let sq=[],sc=null,missed=[],okCnt=0,tryCnt=0,answered=false;
function groupOf(it){ return it.cat.split(" · ")[0]; }
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startScen(){
  sq=shuffle(ITEMS); missed=[];okCnt=0;tryCnt=0; nextScen();
}
function nextScen(){
  if(!sq.length){
    if(missed.length){ const m=missed; missed=[]; sq=m;
      $("main").innerHTML=`<div class="done"><h2>오답 라운드 🔥</h2>
       <p>틀렸던 ${sq.length}개만 다시 골라봐요.</p>
       <button class="btn" onclick="nextScen()">시작</button></div>`; return; }
    $("main").innerHTML=`<div class="done"><h2>🗣️ 의견 말하기 완료!</h2>
     <p>정답 ${okCnt} / 시도 ${tryCnt}<br>상황에 딱 맞는 표현을 고르는 감이 잡혔어요.</p>
     <button class="btn" onclick="startScen()">🔁 다시 (새로 섞기)</button></div>`; return; }
  sc=sq.shift(); answered=false; renderScen();
}
function optionsFor(item){
  // 정답: item.model / 오답: 같은 그룹의 다른 항목 model 3개 (없으면 전체에서 보충)
  const g=groupOf(item);
  let pool=ITEMS.filter(x=>x.n!==item.n && groupOf(x)===g);
  pool=shuffle(pool);
  let distr=pool.slice(0,3).map(x=>x.model);
  if(distr.length<3){
    const extra=shuffle(ITEMS.filter(x=>x.n!==item.n && groupOf(x)!==g)).map(x=>x.model);
    for(const e of extra){ if(distr.length>=3)break; if(!distr.includes(e))distr.push(e); }
  }
  const opts=shuffle([{t:item.model,ok:true},...distr.map(d=>({t:d,ok:false}))]);
  return opts;
}
function renderScen(){
  const opts=optionsFor(sc);
  $("main").innerHTML=`
   <div class="meta"><span>남은 주제 ${sq.length+1}</span><span>정답 ${okCnt} · 시도 ${tryCnt}</span></div>
   <div class="intro">주제에 대해 <b>가장 자연스러운 한 문장</b>을 골라보세요. 상황에 딱 맞는 표현이 든 문장은 하나예요!</div>
   <div class="scen">
     <div class="who">📍 이 주제, 어떻게 말할까요?</div>
     <div class="bubble scene">${sc.sc.txt}</div>
     <div class="mcq" id="mcq">
       ${opts.map((o,i)=>`<button class="opt" data-ok="${o.ok?1:0}" onclick="pickOpt(this)">${o.t}</button>`).join('')}
     </div>
     <div class="result" id="res"></div>
   </div>`;
}
function pickOpt(btn){
  if(answered)return; answered=true; tryCnt++;
  const ok=btn.dataset.ok==='1';
  document.querySelectorAll('#mcq .opt').forEach(b=>{
    b.onclick=null;
    if(b.dataset.ok==='1') b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  const r=$("res"); r.style.display='block';
  if(ok){ okCnt++; r.className='result ok';
    r.innerHTML=`✅ 정답! 이 상황엔 <span class="mdl">${sc.en}</span> (${sc.ko})<br>
      <i>&quot;${sc.model}&quot;</i>`;
  } else {
    if(!missed.includes(sc)) missed.push(sc);
    r.className='result no';
    r.innerHTML=`아쉬워요! 이 주제에 딱 맞는 표현은 <span class="mdl">${sc.en}</span> (${sc.ko})<br>
      <i>&quot;${sc.model}&quot;</i>`;
  }
  const box=document.querySelector('.scen');
  const nb=document.createElement('div'); nb.className='rowb';
  nb.innerHTML=`<button class="btn" onclick="nextScen()">다음 →</button>`;
  box.appendChild(nb);
}
</script>
</body>
</html>
